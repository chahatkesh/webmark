name: Vercel Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-client:
    name: Deploy Client
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CLIENT_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npm install -g vercel@50.28.0
      - name: Pull production environment
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build production
        working-directory: client
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy production
        working-directory: client
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npm install -g vercel@50.28.0
      - name: Pull production environment
        working-directory: server
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build production
        working-directory: server
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy production
        working-directory: server
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
